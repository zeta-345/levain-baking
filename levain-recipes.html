<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>르방 베이킹 레시피</title>
<link rel="icon" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest-recipes.json">
<meta name="theme-color" content="#8A5A34">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FFFFFF;
    --olive: #171717;
    --olive-dark: #111111;
    --crust: #6B6B6B;
    --crust-dark: #333333;
    --ink: #1A1A1A;
    --oil: #171717;
    --accent: #8A5A34;
    --paper: #FFFFFF;
    --line: rgba(0,0,0,0.12);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--cream);
    color: var(--ink);
    font-family: 'Public Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 0 20px 80px; }
  a { color: inherit; text-decoration: none; }

  /* Top bar (shown on detail view) */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 20;
    background: var(--paper);
    border-bottom: 1px solid var(--line);
    max-width: 720px;
    margin: 0 auto;
    padding: 14px 20px;
    display: none;
  }
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--olive);
    cursor: pointer;
    padding: 6px 0;
  }
  .back-btn:hover { text-decoration: underline; }

  /* ===== HOME VIEW ===== */
  .site-hero {
    padding: 60px 20px 34px;
    text-align: center;
    background:
      radial-gradient(ellipse 60% 40% at 20% 0%, rgba(0,0,0,0.035), transparent),
      var(--paper);
  }
  .eyebrow {
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--olive);
    font-weight: 600;
    margin-bottom: 10px;
  }
  .site-hero h1 {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 46px;
    line-height: 1.05;
    margin: 0 0 12px;
    color: var(--olive-dark);
  }
  .site-hero p {
    font-family: 'Fraunces', serif;
    max-width: 440px;
    margin: 0 auto;
    color: #555555;
    font-size: 15px;
    line-height: 1.55;
  }

  .starter-strip {
    display: flex;
    justify-content: center;
    gap: 22px;
    margin-top: 28px;
    flex-wrap: wrap;
  }
  .starter-stat {
    text-align: center;
  }
  .starter-stat .n {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    color: var(--crust-dark);
    font-weight: 600;
  }
  .starter-stat .l {
    font-size: 11.5px;
    color: #777777;
    letter-spacing: 0.03em;
  }

  .levain-status-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #F5F5F5;
    color: #333333;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px 16px;
    text-decoration: none;
    margin-bottom: 8px;
    transition: opacity 0.15s;
  }
  .levain-status-card:hover { opacity: 0.85; }
  .levain-status-card .l-label {
    font-size: 11px;
    color: #999999;
    margin-bottom: 2px;
  }
  .levain-status-card .l-value {
    font-family: 'Fraunces', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--olive-dark);
  }
  .levain-status-card .l-sub {
    font-size: 11px;
    color: #999999;
    margin-top: 2px;
  }
  .levain-status-card .l-arrow {
    font-size: 15px;
    color: var(--accent);
    opacity: 0.8;
  }

  .hero-divider {
    border-bottom: 1px solid var(--line);
    margin: 22px 0 24px;
  }

  .search-box {
    position: relative;
    margin: 22px 0 18px;
  }
  .search-box input {
    width: 100%;
    box-sizing: border-box;
    font-family: 'Public Sans', sans-serif;
    font-size: 14.5px;
    padding: 13px 16px 13px 40px;
    border-radius: 14px;
    border: 1px solid var(--line);
    background: var(--paper);
    color: var(--ink);
    outline: none;
    transition: border-color .15s ease;
  }
  .search-box input:focus { border-color: var(--olive); }
  .search-box .search-icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    font-size: 15px;
    opacity: 0.45;
    pointer-events: none;
  }
  .search-empty {
    text-align: center;
    padding: 30px 10px;
    color: #999999;
    font-size: 13.5px;
  }
  .search-hit-tag {
    display: inline-block;
    font-size: 10.5px;
    color: var(--accent);
    background: rgba(138,90,52,0.1);
    padding: 2px 7px;
    border-radius: 8px;
    margin-left: 6px;
    vertical-align: middle;
  }

  .recipe-grid {
    padding: 40px 0 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .recipe-card {
    display: flex;
    align-items: center;
    gap: 18px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 18px 20px;
    cursor: pointer;
    transition: border-color .15s ease, transform .12s ease;
  }
  .recipe-card:hover { border-color: var(--olive); transform: translateY(-1px); }
  .recipe-icon {
    flex-shrink: 0;
    width: 54px; height: 54px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    background: rgba(0,0,0,0.05);
  }
  .recipe-info { flex: 1; }
  .recipe-name {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 19px;
    color: var(--olive-dark);
    margin-bottom: 3px;
  }
  .recipe-meta {
    font-size: 12.5px;
    color: #777777;
  }
  .cat-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
  }
  .cat-plain  { background: #D9B98F; }
  .cat-sweet  { background: #F0B4BE; }
  .cat-savory { background: #F0CA85; }
  .cat-oil    { background: #A9C7A3; }
  .recipe-arrow {
    font-size: 18px;
    color: var(--olive);
    flex-shrink: 0;
  }
  .recipe-card.disabled {
    opacity: 0.45;
    cursor: default;
  }
  .recipe-card.disabled:hover { transform: none; border-color: var(--line); }
  .soon-tag {
    font-size: 10.5px;
    background: var(--olive);
    color: var(--paper);
    padding: 2px 8px;
    border-radius: 20px;
    margin-left: 8px;
    letter-spacing: 0.02em;
  }

  footer.site-footer {
    text-align: center;
    padding: 40px 0 0;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 13.5px;
    color: #999999;
  }

  /* ===== DETAIL VIEW ===== */
  .hero {
    padding: 40px 20px 36px;
    text-align: center;
    background:
      radial-gradient(ellipse 60% 40% at 20% 0%, rgba(0,0,0,0.035), transparent),
      var(--paper);
    border-bottom: 1px solid var(--line);
  }
  h1.recipe-title {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 46px;
    line-height: 1.02;
    margin: 0 0 14px;
    color: var(--olive-dark);
  }
  .hero p.desc {
    font-family: 'Fraunces', serif;
    max-width: 460px;
    margin: 0 auto;
    color: #555555;
    font-size: 15px;
    line-height: 1.55;
  }

  .dimple-map { margin: 24px auto 0; width: 230px; height: 150px; border-radius: 16px; overflow: hidden; box-shadow: 0 6px 18px rgba(0,0,0,0.12); }
  .dimple-map svg { width: 100%; height: auto; display: block; }
  .dimple-map img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .servings-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-top: 28px;
  }
  .servings-bar button {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1.5px solid var(--olive);
    background: var(--paper);
    color: var(--olive-dark);
    font-size: 19px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s ease, transform .1s ease;
  }
  .servings-bar button:hover { background: var(--olive); color: var(--paper); }
  .servings-bar button:active { transform: scale(0.92); }
  .servings-label {
    font-family: 'Fraunces', serif;
    font-size: 15px;
    min-width: 118px;
    text-align: center;
  }
  .servings-label b { font-size: 15px; font-weight: 400; }
  .servings-label #servings-unit-label { font-family: 'Fraunces', serif; font-size: 15px; }

  section.body-section { padding: 40px 0 0; }
  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 25px;
    color: var(--olive-dark);
    margin: 0 0 4px;
  }
  .section-sub {
    color: #777777;
    font-size: 13.5px;
    margin-bottom: 20px;
  }

  .ingredient-list { list-style: none; padding: 0; margin: 0; }
  .ingredient-list li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 13px 4px;
    border-bottom: 1px solid var(--line);
    font-size: 15px;
  }
  .ingredient-list li:last-child { border-bottom: none; }
  .ing-tag {
    font-size: 11.5px;
    color: var(--crust);
    background: rgba(0,0,0,0.05);
    padding: 2px 7px;
    border-radius: 20px;
    margin-left: 8px;
  }
  .ing-amt {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    color: var(--accent);
    white-space: nowrap;
  }

  .topping-wrap {
    margin-top: 22px;
    padding-top: 20px;
    border-top: 1px dashed var(--line);
  }
  .topping-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--olive);
    margin-bottom: 10px;
    letter-spacing: 0.02em;
  }
  .topping-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .topping-row + .topping-row { margin-top: 8px; }
  .topping-btn {
    font-family: 'Public Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 7px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--line);
    background: var(--paper);
    color: var(--olive-dark);
    cursor: pointer;
    transition: all .15s ease;
  }
  .topping-btn:hover { border-color: var(--olive); }
  .topping-btn.active {
    background: var(--olive);
    border-color: var(--olive);
    color: var(--paper);
  }
  .topping-btn.sub {
    border-color: rgba(0,0,0,0.18);
    font-weight: 500;
  }
  .topping-btn.sub.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--paper);
  }
  .topping-extra-list {
    list-style: none;
    padding: 0;
    margin: 14px 0 0;
    background: rgba(0,0,0,0.025);
    border-radius: 12px;
    overflow: hidden;
  }
  .topping-extra-list li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    border-bottom: 1px solid var(--line);
    font-size: 14px;
  }
  .topping-extra-list li:last-child { border-bottom: none; }

  .steps { display: flex; flex-direction: column; gap: 10px; }
  .step {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px 18px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    transition: opacity .2s ease;
  }
  .step.done { opacity: 0.5; }
  .step-check {
    flex-shrink: 0;
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1.5px solid var(--olive);
    margin-top: 2px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: transparent;
    font-size: 14px;
    transition: all .15s ease;
  }
  .step.done .step-check { background: var(--olive); color: var(--paper); }
  .step-body { flex: 1; }
  .step-title { font-weight: 700; font-size: 15.5px; margin-bottom: 4px; color: var(--olive-dark); }
  .step-text { font-size: 14.5px; line-height: 1.6; color: #333333; }
  .step-text b { color: var(--accent); font-variant-numeric: tabular-nums; }

  .timer-row { margin-top: 10px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .timer-btn {
    font-family: 'Public Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 13px;
    border-radius: 20px;
    border: 1.5px solid var(--crust);
    background: transparent;
    color: var(--crust-dark);
    cursor: pointer;
  }
  .timer-btn:hover { background: rgba(0,0,0,0.05); }
  .timer-display { font-variant-numeric: tabular-nums; font-size: 13.5px; color: var(--crust-dark); font-weight: 600; }
  .timer-btn.running { background: var(--crust); color: var(--paper); }

  .note {
    margin-top: 44px;
    background: #F5F5F5;
    color: #333333;
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 22px 24px;
    font-size: 14.5px;
    line-height: 1.65;
  }
  .note b { color: var(--accent); }

  footer.recipe-footer {
    text-align: center;
    padding: 30px 0 0;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 13.5px;
    color: #999999;
  }

  @media (max-width: 480px) {
    .site-hero h1 { font-size: 34px; }
    h1.recipe-title { font-size: 34px; }
  }
</style>
</head>
<body>

<div class="topbar" id="topbar">
  <div class="back-btn" id="back-btn">← 레시피 목록</div>
</div>

<!-- ===== HOME VIEW ===== -->
<div id="home-view">
  <div class="site-hero">
    <div class="eyebrow">Levain Baking Notebook</div>
    <h1>르방 베이킹 레시피</h1>
    <p>내 르방으로 만드는 빵 모음. 인분을 조절하면 재료량이 자동으로 바뀌고, 발효·굽기 단계는 타이머로 확인할 수 있어요.</p>
    <div class="starter-strip">
      <div class="starter-stat"><div class="n">6~7h</div><div class="l">평균 피크 타임</div></div>
      <div class="starter-stat"><div class="n" id="stat-completed">-</div><div class="l">완성 레시피</div></div>
      <div class="starter-stat"><div class="n" id="stat-upcoming">-</div><div class="l">도전 예정</div></div>
    </div>
  </div>

  <div class="wrap">
    <a href="levain-log.html" class="levain-status-card" id="levain-status-card">
      <div>
        <div class="l-label">마지막 급식으로부터</div>
        <div class="l-value" id="levain-status-value">기록 없음</div>
        <div class="l-sub" id="levain-status-sub">발효 기록 보러 가기</div>
      </div>
      <div class="l-arrow">→</div>
    </a>
    <div class="hero-divider"></div>
    <div class="search-box">
      <span class="search-icon">⌕</span>
      <input type="text" id="recipe-search" placeholder="검색" autocomplete="off" />
    </div>
    <div class="recipe-grid" id="recipe-grid"></div>
    <footer class="site-footer">@zeta_function__</footer>
  </div>
</div>

<!-- ===== DETAIL VIEW ===== -->
<div id="detail-view" style="display:none;">
  <div class="hero">
    <div class="eyebrow" id="detail-eyebrow">Recipe</div>
    <h1 class="recipe-title" id="detail-title"></h1>
    <p class="desc" id="detail-desc"></p>

    <div class="dimple-map" id="detail-visual"></div>

    <div class="servings-bar">
      <button id="minus" aria-label="줄이기">−</button>
      <div class="servings-label"><b id="servings-num">4</b><span id="servings-unit-label"></span></div>
      <button id="plus" aria-label="늘리기">+</button>
    </div>
  </div>

  <div class="wrap">
    <section class="body-section">
      <div class="section-title">재료</div>
      <div class="section-sub">인분을 조절하면 아래 수치가 자동으로 바뀝니다</div>
      <ul class="ingredient-list" id="ingredients"></ul>
      <div id="topping-section"></div>
    </section>

    <section class="body-section">
      <div class="section-title">과정</div>
      <div class="section-sub">체크하며 진행하고, 발효/굽기 단계는 타이머를 눌러 확인하세요</div>
      <div class="steps" id="steps"></div>
    </section>

    <div class="note" id="detail-note"></div>

    <footer class="recipe-footer">@zeta_function__</footer>
  </div>
</div>

<script>
/* =========================================================

      { title: '딤플 만들기 및 토핑', text: '손가락에 남은 오일을 묻혀 반죽 전체에 딤플(움푹 패인 자국)을 만들어줍니다. 남은 올리브오일을 골고루 뿌리고 <b>굵은 소금</b>을 톡톡 뿌려줍니다.', timer: null, isToppingStep: true },
      { title: '굽기', text: '220도로 예열한 오븐에서 표면이 노릇하고 바삭해질 때까지 구워줍니다.', timer: 25*60 },
      { title: '식히기', text: '오븐에서 꺼낸 직후 팬에서 바로 분리해 식힘망 위에서 식혀줍니다. 팬에 계속 두면 바닥이 눅눅해질 수 있어요.', timer: null },
    ],
    note: '고수분 반죽(75%)이라 처음엔 반죽이 질척해서 당황할 수 있는데, 스트레치 앤 폴드를 반복하면 점점 탄력이 생겨요. 손반죽 시 물에 손을 적셔가며 하면 덜 달라붙어요. 르방은 <b>피크 상태</b>(급식 후 6~7시간, 2배 부푼 시점) 기준으로 80g 사용하시면 됩니다. 딤플을 깊게 눌러야 오일과 토핑이 잘 스며들어 포카치아 특유의 맛이 살아나요.'
  },

function fmtElapsedShort(ms) {
  if (ms == null || ms < 0) return '-';
  const totalMin = Math.floor(ms / 60000);
  const d = Math.floor(totalMin / 1440);
  const h = Math.floor((totalMin % 1440) / 60);
  const m = totalMin % 60;
  if (d === 0 && h === 0 && m === 0) return '0h';
  let out = '';
  if (d > 0) out += `${d}d `;
  if (h > 0 || d > 0) out += `${h}h`;
  if (m > 0) out += `${m}m`;
  return out.trim();
}

function renderLevainStatusCard() {
  const valueEl = document.getElementById('levain-status-value');
  const subEl = document.getElementById('levain-status-sub');
  if (!valueEl) return;

  let entries = [];
  try {
    const raw = localStorage.getItem('levain-log-entries');
    entries = raw ? JSON.parse(raw) : [];
  } catch (e) {
    entries = [];
  }

  let lastFeeding = null;
  entries.slice().sort((a, b) => new Date(a.ts) - new Date(b.ts));
  for (let i = entries.length - 1; i >= 0; i--) {
    if (entries[i].isFeeding) { lastFeeding = entries[i]; break; }
  }

  if (!lastFeeding) {
    valueEl.textContent = '기록 없음';
    subEl.textContent = '발효 기록 시작하기';
    return;
  }

  const diff = Date.now() - new Date(lastFeeding.ts).getTime();
  valueEl.textContent = fmtElapsedShort(diff) + ' 경과';
  subEl.textContent = '발효 기록 보러 가기';
}
setInterval(renderLevainStatusCard, 30000);

// 레시피 하나가 검색어와 매치되는지 확인하고, 어디서 매치됐는지(제목/재료/과정) 반환
function matchRecipe(r, q) {
  if (r.name.toLowerCase().includes(q)) return '제목';
  if ((r.meta || '').toLowerCase().includes(q) || (r.desc || '').toLowerCase().includes(q)) return '제목';
  if ((r.ingredients || []).some(i =>
    i.name.toLowerCase().includes(q) ||
    (i.tag || '').toLowerCase().includes(q) ||
    String(i.base).includes(q) ||
    `${i.base}${i.unit}`.toLowerCase().includes(q)
  )) return '재료';
  if ((r.steps || []).some(s => s.title.toLowerCase().includes(q) || s.text.toLowerCase().includes(q))) return '과정';
  if ((r.toppingOptions || []).some(cat =>
    cat.options.some(opt =>
      opt.name.toLowerCase().includes(q) ||
      (opt.ingredients || []).some(i =>
        i.name.toLowerCase().includes(q) ||
        String(i.base).includes(q) ||
        `${i.base}${i.unit}`.toLowerCase().includes(q)
      )
    )
  )) return '재료';
  return null;
}

function renderHome() {
  renderLevainStatusCard();

  document.getElementById('stat-completed').textContent = RECIPES.length;
  document.getElementById('stat-upcoming').textContent = UPCOMING_RECIPES.length + '+';

  const grid = document.getElementById('recipe-grid');
  const searchInput = document.getElementById('recipe-search');
  const q = (searchInput.value || '').trim().toLowerCase();
  grid.innerHTML = '';

  const filteredRecipes = q
    ? RECIPES.map(r => ({ r, hit: matchRecipe(r, q) })).filter(x => x.hit)
    : RECIPES.map(r => ({ r, hit: null }));

  filteredRecipes.forEach(({ r, hit }) => {
    const card = document.createElement('div');
    card.className = 'recipe-card';
    card.innerHTML = `
      <div class="recipe-icon">${r.icon}</div>
      <div class="recipe-info">
        <div class="recipe-name"><span class="cat-dot cat-${r.category}"></span>${r.name}${hit ? `<span class="search-hit-tag">${hit} 일치</span>` : ''}</div>
        <div class="recipe-meta">${r.meta}</div>
      </div>
      <div class="recipe-arrow">→</div>
    `;
    card.addEventListener('click', () => openRecipe(r.id));
    grid.appendChild(card);
  });

  // 준비 중 카드는 이름으로만 검색 대상에 포함 (검색어 없을 때는 항상 표시)
  const filteredUpcoming = q
    ? UPCOMING_RECIPES.filter(u => u.name.toLowerCase().includes(q))
    : UPCOMING_RECIPES;

  filteredUpcoming.forEach(u => {
    const card = document.createElement('div');
    card.className = 'recipe-card disabled';
    card.innerHTML = `
      <div class="recipe-icon">${u.icon}</div>
      <div class="recipe-info">
        <div class="recipe-name"><span class="cat-dot cat-${u.category}"></span>${u.name}<span class="soon-tag">준비 중</span></div>
        <div class="recipe-meta">레시피 추가 예정</div>
      </div>
    `;
    grid.appendChild(card);
  });

  if (q && filteredRecipes.length === 0 && filteredUpcoming.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'search-empty';
    empty.textContent = `"${searchInput.value.trim()}"에 대한 검색 결과가 없어요.`;
    grid.appendChild(empty);
  }
}

/* =========================================================
   상세 뷰 렌더링
   ========================================================= */
function openRecipe(id) {
  currentRecipe = RECIPES.find(r => r.id === id);
  servings = currentRecipe.baseServings;

  document.getElementById('home-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  document.getElementById('topbar').style.display = 'block';
  window.scrollTo(0, 0);

  document.getElementById('detail-eyebrow').textContent = currentRecipe.icon + '  ' + currentRecipe.name;
  document.getElementById('detail-title').textContent = currentRecipe.name;
  document.getElementById('detail-desc').textContent = currentRecipe.desc;
  document.getElementById('detail-note').innerHTML = '<b>메모.</b> ' + currentRecipe.note;
  document.getElementById('servings-unit-label').textContent = computeUnitLabel(currentRecipe, servings);
  document.getElementById('servings-num').textContent = servings;

  selectedToppingCategoryIdx = 0;
  selectedToppingOptionId = null;
  if (currentRecipe.toppingOptions) {
    const firstCat = currentRecipe.toppingOptions[0];
    const def = firstCat.options.find(o => o.default) || firstCat.options[0];
    selectedToppingOptionId = def.id;
  }

  renderVisual();
  renderIngredients();
  renderToppingSection();
  renderSteps();
}

function closeRecipe() {
  document.getElementById('home-view').style.display = 'block';
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('topbar').style.display = 'none';
  currentRecipe = null;
  window.scrollTo(0, 0);
}

function fmtAmount(n) {
  const rounded = Math.round(n * 10) / 10;
  return rounded % 1 === 0 ? rounded.toString() : rounded.toFixed(1);
}

function computeUnitLabel(rec, s) {
  if (rec.panServings) {
    const panCount = Math.ceil(s / rec.panServings);
    return `인분 · 팬 ${panCount}개`;
  }
  return rec.servingsUnit;
}

function getSelectedToppingOption() {
  if (!currentRecipe || !currentRecipe.toppingOptions) return null;
  const cat = currentRecipe.toppingOptions[selectedToppingCategoryIdx];
  if (!cat) return null;
  return cat.options.find(o => o.id === selectedToppingOptionId) || cat.options[0];
}

function renderToppingSection() {
  const container = document.getElementById('topping-section');
  container.innerHTML = '';
  if (!currentRecipe.toppingOptions) return;

  const wrap = document.createElement('div');
  wrap.className = 'topping-wrap';

  // 카테고리 행
  const label = document.createElement('div');
  label.className = 'topping-label';
  label.textContent = '토핑 선택';
  wrap.appendChild(label);

  const catRow = document.createElement('div');
  catRow.className = 'topping-row';
  currentRecipe.toppingOptions.forEach((cat, idx) => {
    const btn = document.createElement('button');
    btn.className = 'topping-btn' + (idx === selectedToppingCategoryIdx ? ' active' : '');
    btn.textContent = cat.category;
    btn.addEventListener('click', () => {
      selectedToppingCategoryIdx = idx;
      const def = cat.options.find(o => o.default) || cat.options[0];
      selectedToppingOptionId = def.id;
      renderToppingSection();
      renderSteps();
    });
    catRow.appendChild(btn);
  });
  wrap.appendChild(catRow);

  // 세부 옵션 행
  const subRow = document.createElement('div');
  subRow.className = 'topping-row';
  const currentCat = currentRecipe.toppingOptions[selectedToppingCategoryIdx];
  currentCat.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'topping-btn sub' + (opt.id === selectedToppingOptionId ? ' active' : '');
    btn.textContent = opt.name;
    btn.addEventListener('click', () => {
      selectedToppingOptionId = opt.id;
      renderToppingSection();
      renderSteps();
    });
    subRow.appendChild(btn);
  });
  wrap.appendChild(subRow);

  // 선택된 토핑의 재료
  const selected = getSelectedToppingOption();
  if (selected && selected.ingredients && selected.ingredients.length) {
    const ul = document.createElement('ul');
    ul.className = 'topping-extra-list';
    selected.ingredients.forEach(ing => {
      const scaled = ing.base * (servings / currentRecipe.baseServings);
      const li = document.createElement('li');
      li.innerHTML = `
        <span class="ing-name">${ing.name}${ing.tag ? `<span class="ing-tag">${ing.tag}</span>` : ''}</span>
        <span class="ing-amt">${fmtAmount(scaled)}${ing.unit || ''}</span>
      `;
      ul.appendChild(li);
    });
    wrap.appendChild(ul);
  }

  container.appendChild(wrap);
}

function renderIngredients() {
  const ul = document.getElementById('ingredients');
  ul.innerHTML = '';
  currentRecipe.ingredients.forEach(ing => {
    const scaled = ing.base * (servings / currentRecipe.baseServings);
    const li = document.createElement('li');
    li.innerHTML = `
      <span class="ing-name">${ing.name}${ing.tag ? `<span class="ing-tag">${ing.tag}</span>` : ''}</span>
      <span class="ing-amt">${fmtAmount(scaled)}${ing.unit}</span>
    `;
    ul.appendChild(li);
  });
}

function fmtTime(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function renderSteps() {
  const container = document.getElementById('steps');
  container.innerHTML = '';
  currentRecipe.steps.forEach((step, i) => {
    const div = document.createElement('div');
    div.className = 'step';
    div.id = `step-${i}`;

    let stepText = step.text;
    if (step.isToppingStep && currentRecipe.toppingOptions) {
      const selected = getSelectedToppingOption();
      if (selected && selected.stepText) stepText = selected.stepText;
    }

    let timerHtml = '';
    if (step.timer) {
      timerHtml = `
        <div class="timer-row">
          <button class="timer-btn" data-idx="${i}">타이머 시작</button>
          <span class="timer-display" id="timer-display-${i}">${fmtTime(step.timer)}</span>
        </div>
      `;
    }

    div.innerHTML = `
      <div class="step-check" data-idx="${i}">✓</div>
      <div class="step-body">
        <div class="step-title">${i+1}. ${step.title}</div>
        <div class="step-text">${stepText}</div>
        ${timerHtml}
      </div>
    `;
    container.appendChild(div);
  });

  container.querySelectorAll('.step-check').forEach(el => {
    el.addEventListener('click', () => {
      const stepEl = document.getElementById(`step-${el.dataset.idx}`);
      stepEl.classList.toggle('done');
    });
  });

  container.querySelectorAll('.timer-btn').forEach(btn => {
    const idx = btn.dataset.idx;
    btn.addEventListener('click', () => toggleTimer(idx, btn));
  });
}

let audioCtx = null;
function playBeep() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const now = audioCtx.currentTime;
    [0, 0.28, 0.56].forEach((offset) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.0001, now + offset);
      gain.gain.exponentialRampToValueAtTime(0.35, now + offset + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + offset + 0.22);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now + offset);
      osc.stop(now + offset + 0.24);
    });
  } catch (e) {
    console.error('beep 재생 실패', e);
  }
}

function toIcsDate(date) {
  return date.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
}

function icsEscape(str) {
  return String(str).replace(/[\\;,]/g, m => '\\' + m).replace(/\n/g, '\\n');
}

function downloadStepReminder(idx, secondsFromNow) {
  const step = currentRecipe.steps[idx];
  if (!step || !step.timer) return;

  const now = new Date();
  const end = new Date(now.getTime() + secondsFromNow * 1000);
  const uid = `levain-${currentRecipe.id}-${idx}-${now.getTime()}@levain-baking`;

  const title = `${currentRecipe.name} · ${step.title} 완료`;
  const desc = icsEscape(step.text.replace(/<[^>]+>/g, ''));

  const ics = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//levain-baking//KO',
    'CALSCALE:GREGORIAN',
    'BEGIN:VEVENT',
    `UID:${uid}`,
    `DTSTAMP:${toIcsDate(now)}`,
    `DTSTART:${toIcsDate(end)}`,
    `DTEND:${toIcsDate(new Date(end.getTime() + 5 * 60000))}`,
    `SUMMARY:${icsEscape(title)}`,
    `DESCRIPTION:${desc}`,
    'BEGIN:VALARM',
    'ACTION:DISPLAY',
    'DESCRIPTION:REMINDER',
    'TRIGGER:PT0M',
    'END:VALARM',
    'END:VEVENT',
    'END:VCALENDAR',
  ].join('\r\n');

  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${currentRecipe.id}-step${Number(idx) + 1}-reminder.ics`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function toggleTimer(idx, btn) {
  const key = currentRecipe.id + '-' + idx;
  const display = document.getElementById(`timer-display-${idx}`);

  if (timerStates[key] && timerStates[key].interval) {
    // 일시정지: 실제 남은 시간을 endTime 기준으로 다시 계산해서 고정
    clearInterval(timerStates[key].interval);
    timerStates[key].interval = null;
    timerStates[key].remaining = Math.max(0, Math.round((timerStates[key].endTime - Date.now()) / 1000));
    btn.classList.remove('running');
    btn.textContent = '타이머 시작';
    return;
  }

  if (!timerStates[key]) {
    timerStates[key] = { remaining: currentRecipe.steps[idx].timer };
  }
  if (timerStates[key].remaining <= 0) {
    timerStates[key].remaining = currentRecipe.steps[idx].timer;
  }

  // 오디오는 반드시 사용자 클릭(제스처) 시점에 한 번 준비해둬야 나중에 소리가 나요
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
  }

  // 남은 초 대신 '끝나는 실제 시각'을 저장 → background에서 setInterval이 밀리거나 건너뛰어도
  // 다시 화면을 볼 때 실제 경과 시간 기준으로 정확히 재계산됨
  timerStates[key].endTime = Date.now() + timerStates[key].remaining * 1000;
  btn.classList.add('running');
  btn.textContent = '일시정지';

  // 앱 타이머 시작과 동시에, 같은 시각에 끝나는 캘린더 알림(.ics)도 함께 다운로드
  downloadStepReminder(idx, timerStates[key].remaining);

  const tick = () => {
    const state = timerStates[key];
    if (!state || !state.interval) return;
    const remaining = Math.round((state.endTime - Date.now()) / 1000);
    if (remaining <= 0) {
      clearInterval(state.interval);
      state.interval = null;
      state.remaining = 0;
      if (display) display.textContent = '완료!';
      btn.classList.remove('running');
      btn.textContent = '다시 시작';
      playBeep();
      return;
    }
    state.remaining = remaining;
    if (display) display.textContent = fmtTime(remaining);
  };

  timerStates[key].interval = setInterval(tick, 1000);
  tick();
}

function renderVisual() {
  const el = document.getElementById('detail-visual');
  if (currentRecipe.image) {
    el.innerHTML = `<img src="${currentRecipe.image}" alt="${currentRecipe.name}">`;
  } else {
    el.innerHTML = '';
  }
}

/* =========================================================
   이벤트 바인딩
   ========================================================= */
document.getElementById('back-btn').addEventListener('click', closeRecipe);
document.getElementById('minus').addEventListener('click', () => {
  if (servings > 1) { servings--; updateServings(); }
});
document.getElementById('plus').addEventListener('click', () => {
  if (servings < currentRecipe.servingsMax) { servings++; updateServings(); }
});

function updateServings() {
  document.getElementById('servings-num').textContent = servings;
  document.getElementById('servings-unit-label').textContent = computeUnitLabel(currentRecipe, servings);
  renderIngredients();
  renderToppingSection();
}

document.getElementById('recipe-search').addEventListener('input', renderHome);
renderHome();
</script>
